name: Build LineageOS 16 on Crave
on:
  workflow_dispatch: # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Workflow
        uses: actions/checkout@v4

      - name: Setup Crave CLI
        run: |
          mkdir -p bin
          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s -- --version latest
          mv crave bin/
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH
          mkdir -p ~/.crave
          echo '${{ secrets.CRAVE_CONF }}' > ~/.crave/crave.conf

      - name: Run LOS 16 Build on Crave
        run: |
          # Crave ke server par commands execute ho rahi hain
          crave run -- "
            # 1. Initialize LOS 16 Source
            repo init -u https://github.com/LineageOS/android.git -b lineage-16.0 --git-lfs --depth=1 &&
            
            # 2. Sync Source (Crave servers are very fast)
            repo sync -c -j\$(nproc --all) --force-sync --no-clone-bundle --no-tags &&
            
            # 3. Clone your Device Tree (A31 / OP4C7D)
            git clone https://github.com/ansh-m14x/android-recovery-OP4C7D -b main device/oppo/OP4C7D &&
            
            # 4. Setup Environment
            source build/envsetup.sh &&
            
            # 5. Lunch Device (Check your lunch combo name, usually lineage_device-userdebug)
            lunch lineage_OP4C7D-userdebug &&
            
            # 6. Start the Build (mka or brunch)
            mka bacon -j\$(nproc --all)
          "

      - name: Upload Build Logs (If fail)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: out/error.log
